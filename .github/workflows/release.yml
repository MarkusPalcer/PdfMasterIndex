name: Build and Push Release Package

on:
  push:
    tags:
      - 'v*'
    
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish Service/Service.csproj -c Release -o ./publish
          cd publish
          zip -r ../PdfMasterIndex-${{ github.ref_name }}.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: PdfMasterIndex-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            