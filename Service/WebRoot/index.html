<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PDF Master Index</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="search.css">
    </head>
    <body>
        <h1>PDF Master Index</h1>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search..." />
            <span id="filter-icon" class="filter-icon" title="Filter by ScanPaths">&#x1F6E0;</span>
            <span class="search-icon" title="Search">&#128269;</span>
            <div id="filter-popup" class="filter-popup hidden">
                <ul id="scanpaths-list"></ul>
            </div>
            <div id="search-error" class="search-error-message">Only searching for single words is allowed.</div>
            <div id="search-spinner" class="spinner"></div>
        </div>

        <div id="search-results-container"></div>
    
        <script src="lib/jquery.min.js"></script>
        <script src="nav.js"></script>
        <script src="lib/signalr.min.js"></script>
        <script src="scan.js"></script>
        <script src="display.js"></script>
        <script src="search.js"></script>
    </body>
</html>
