<div id="status-container" class="status-container">
    <div class="status-header">
        <span class="status-title">Update index</span>
        <div class="status-actions">
            <a id="scan-link" class="scan-link" href="#" title="Scan">&#x21BB;</a>
            <a id="cancel-link" class="cancel-link" href="#" title="Cancel">&#x2715;</a>
            <div id="cancel-spinner" class="spinner"></div>
        </div>
    </div>
    
    <div id="current-step-text" class="progress-label hidden">Current Step:</div>

    <div id="top-progress-section" class="progress-section hidden">
        <div class="progress-label">Step Progress</div>
        <div class="progress-bar-container">
            <div id="top-progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
        </div>
    </div>

    <div id="bottom-progress-section" class="progress-section hidden">
        <div class="progress-label">File Progress</div>
        <div class="progress-bar-container">
            <div id="bottom-progress-bar-fill" class="progress-bar-fill" style="width: 0%;"></div>
        </div>
    </div>
</div>
