<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>PDF Master Index - Settings</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <a id="close-link" class="top-right-link" href="index.html" title="Close">&#x2715;</a>
        <h1>PDF Master Index – Settings</h1>
    
        <h2>Source Folders</h2>
        <table>
            <thead>
                <tr>
                    <th>Mounted folder</th>
                    <th>Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="source-folders-list">
                <tr id="new-scan-folder">
                    <td><input type="text" id="new-path"></td>
                    <td><input type="text" id="new-name"></td>
                    <td style="text-align: center;">
                        <span id="save-new-scan-folder" class="action-icon" title="Save">&#128190;</span>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
        <script src="scan.js"></script>
        <script src="settings.js"></script>
    </body>
</html>
