<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PDF Master Index - Settings</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="settings.css">
        <link rel="stylesheet" href="tags.css">
    </head>
    <body>
        <h1>PDF Master Index – Settings</h1>
    
        <h2>Source Folders</h2>
        <table>
            <thead>
                <tr>
                    <th>Mounted folder</th>
                    <th>Name</th>
                    <th>Tags</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="source-folders-list">
                <tr id="new-scan-folder">
                    <td><input type="text" id="new-path" placeholder="Folder Path..."></td>
                    <td><input type="text" id="new-name" placeholder="Display Name..."></td>
                    <td>
                        <span id="new-tags-container" class="tags"></span>
                        <input type="text" id="new-tag-entry" placeholder="Add tag..." style="width: 80px; font-size: 0.8em; margin-left: 5px;">
                    </td>
                    <td style="text-align: center;">
                        <span id="save-new-scan-folder" class="action-icon" title="Save">&#128190;</span>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <script src="lib/jquery.min.js"></script>
        <script src="nav.js"></script>
        <script src="lib/signalr.min.js"></script>
        <script src="scan.js"></script>
        <script src="settings.js"></script>
    </body>
</html>
