<div class="document-item" data-name="{{name}}">
    <div class="document-header">
        <span class="item-name">{{name}}</span>
        <span class="item-info">({{pageCount}} pages, {{wordCount}} words)</span>
        <span class="item-tags">
            <input type="text" class="new-tag-input" placeholder="Add tag..." style="width: 80px; font-size: 0.8em; margin-left: 5px;">
        </span>
    </div>
</div>
